<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#98F5FF"/>
      <stop offset="100%" stop-color="#5CE0FF"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0a0a0f"/>
  <!-- Glow effect -->
  <circle cx="50" cy="50" r="45" fill="url(#iconGrad)" opacity="0.1"/>
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#iconGrad)" stroke-width="2"/>
  <!-- Dog head -->
  <ellipse cx="50" cy="52" rx="32" ry="36" fill="#C5FAFF"/>
  <!-- Left Ear -->
  <ellipse cx="25" cy="28" rx="12" ry="16" fill="#7BB8C4" transform="rotate(-20 25 28)"/>
  <!-- Right Ear -->
  <ellipse cx="75" cy="28" rx="12" ry="16" fill="#7BB8C4" transform="rotate(20 75 28)"/>
  <!-- Left Eye (wonky) -->
  <circle cx="38" cy="48" r="6" fill="white"/>
  <circle cx="39" cy="49" r="2.5" fill="#333"/>
  <!-- Right Eye (different size) -->
  <circle cx="62" cy="51" r="7" fill="white"/>
  <circle cx="61" cy="52" r="3" fill="#333"/>
  <!-- Nose -->
  <ellipse cx="50" cy="62" rx="5" ry="4" fill="#333"/>
  <!-- Mouth -->
  <path d="M 38 72 Q 50 80 62 72" stroke="#333" stroke-width="2" fill="none"/>
  <!-- Tongue sticking out -->
  <path d="M 50 75 Q 54 83 50 87 Q 46 83 50 77 Z" fill="#FF69B4"/>
  <!-- Ugly spots -->
  <circle cx="35" cy="60" r="2" fill="#5E9BA8"/>
  <circle cx="65" cy="65" r="1.5" fill="#5E9BA8"/>
</svg>
