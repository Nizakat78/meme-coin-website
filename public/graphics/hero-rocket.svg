<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <radialGradient id="starGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGradient)"/>

  <!-- Stars -->
  <circle cx="100" cy="80" r="3" fill="white" opacity="0.8">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="50" r="2" fill="white" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="100" r="4" fill="white" opacity="0.9">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="300" r="2.5" fill="white" opacity="0.7">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="350" r="3.5" fill="white" opacity="0.8">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Rocket -->
  <g transform="translate(300, 200)">
    <!-- Rocket body -->
    <path d="M 0 -100 L -30 50 L 0 80 L 30 50 Z" fill="#e5e7eb" stroke="#d1d5db" stroke-width="2"/>

    <!-- Rocket window -->
    <circle cx="0" cy="-20" r="15" fill="#93c5fd" stroke="#60a5fa" stroke-width="2"/>

    <!-- Rocket details -->
    <path d="M -30 50 L -50 70 L -30 60 Z" fill="#9ca3af"/>
    <path d="M 30 50 L 50 70 L 30 60 Z" fill="#9ca3af"/>

    <!-- Fire animation -->
    <g>
      <path d="M -15 80 C -10 120, 10 120, 15 80 Z" fill="#f59e0b">
        <animate attributeName="d" values="M -15 80 C -10 120, 10 120, 15 80 Z;M -20 80 C -15 130, 15 130, 20 80 Z;M -15 80 C -10 120, 10 120, 15 80 Z" dur="0.8s" repeatCount="indefinite"/>
      </path>
      <path d="M -10 80 C -5 110, 5 110, 10 80 Z" fill="#fbbf24">
        <animate attributeName="d" values="M -10 80 C -5 110, 5 110, 10 80 Z;M -15 80 C -8 120, 8 120, 15 80 Z;M -10 80 C -5 110, 5 110, 10 80 Z" dur="0.8s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- Ulgy Dog in rocket window -->
    <g transform="translate(-15, -35) scale(0.3)">
      <ellipse cx="25" cy="25" rx="25" ry="30" fill="#d2b48c"/>
      <circle cx="15" cy="20" r="6" fill="#ffffff"/>
      <circle cx="17" cy="22" r="2" fill="#000000"/>
      <circle cx="35" cy="25" r="7" fill="#ffffff"/>
      <circle cx="33" cy="27" r="2" fill="#000000"/>
      <ellipse cx="25" cy="40" rx="5" ry="4" fill="#000000"/>
      <path d="M 10 50 Q 25 60 40 50" stroke="#000000" stroke-width="2" fill="none"/>
    </g>
  </g>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="url(#starGradient)" opacity="0.2"/>
  <circle cx="500" cy="300" r="100" fill="url(#starGradient)" opacity="0.15"/>

  <!-- Text elements -->
  <text x="50" y="50" font-family="Arial, sans-serif" font-size="24" fill="#fbbf24" font-weight="bold">ULGD</text>
  <text x="450" y="350" font-family="Arial, sans-serif" font-size="18" fill="#f59e0b" font-weight="bold">To the Moon!</text>
</svg>