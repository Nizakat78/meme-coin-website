<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGradient)" rx="10"/>

  <!-- Success Kid style meme -->
  <g transform="translate(200, 150)">
    <!-- Ulgy Dog with raised paw -->
    <ellipse cx="0" cy="0" rx="50" ry="60" fill="#d2b48c"/>
    <circle cx="-20" cy="-20" r="10" fill="#ffffff"/>
    <circle cx="-18" cy="-18" r="4" fill="#000000"/>
    <circle cx="20" cy="-18" r="12" fill="#ffffff"/>
    <circle cx="18" cy="-16" r="4" fill="#000000"/>
    <ellipse cx="0" cy="25" rx="8" ry="6" fill="#000000"/>
    <path d="M -30 40 Q 0 50 30 40" stroke="#000000" stroke-width="2" fill="none"/>

    <!-- Raised paw -->
    <path d="M 35 10 Q 60 0 50 -20 Q 40 0 35 10 Z" fill="#d2b48c" stroke="#a0522d" stroke-width="1"/>

    <!-- Sunglasses -->
    <path d="M -25 -25 Q -15 -30, -5 -25 Q -5 -30, 5 -30 Q 5 -25, 15 -30 Q 25 -25, 25 -20 Q 15 -22, 5 -22 Q -5 -22, -15 -22 Q -25 -20, -25 -25 Z" fill="#000000"/>

    <!-- Top text -->
    <rect x="-180" y="-100" width="360" height="25" fill="black" opacity="0.8"/>
    <text x="0" y="-82" text-anchor="middle" font-family="Impact, Arial, sans-serif" font-size="16" fill="white" font-weight="bold">SUCCESS KID ULGY DOG</text>

    <!-- Bottom text -->
    <rect x="-180" y="60" width="360" height="25" fill="black" opacity="0.8"/>
    <text x="0" y="78" text-anchor="middle" font-family="Impact, Arial, sans-serif" font-size="16" fill="white" font-weight="bold">MAKING MILLIONS WITH ULGD</text>
  </g>
</svg>