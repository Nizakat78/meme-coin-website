<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGradient)" rx="10"/>

  <!-- Two panel meme -->
  <g transform="translate(0, 0)">
    <!-- Left panel -->
    <g transform="translate(100, 100)">
      <!-- Normal dog -->
      <ellipse cx="0" cy="0" rx="30" ry="35" fill="#d2b48c"/>
      <circle cx="-12" cy="-10" r="6" fill="#ffffff"/>
      <circle cx="-10" cy="-8" r="2" fill="#000000"/>
      <circle cx="12" cy="-8" r="6" fill="#ffffff"/>
      <circle cx="10" cy="-6" r="2" fill="#000000"/>
      <ellipse cx="0" cy="15" rx="5" ry="4" fill="#000000"/>
      <path d="M -15 25 Q 0 30 15 25" stroke="#000000" stroke-width="2" fill="none"/>
      <text x="0" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">NORMAL DOGS</text>
    </g>

    <!-- Right panel -->
    <g transform="translate(300, 100)">
      <!-- Ulgy Dog -->
      <ellipse cx="0" cy="0" rx="35" ry="40" fill="#d2b48c"/>
      <circle cx="-15" cy="-15" r="8" fill="#ffffff"/>
      <circle cx="-12" cy="-12" r="3" fill="#000000"/>
      <circle cx="20" cy="-10" r="10" fill="#ffffff"/>
      <circle cx="15" cy="-7" r="3" fill="#000000"/>
      <ellipse cx="0" cy="20" rx="6" ry="5" fill="#000000"/>
      <path d="M -20 30 Q 0 40 20 30" stroke="#000000" stroke-width="2" fill="none"/>
      <path d="M 0 30 Q 10 45 5 55 Q -5 50 0 35 Z" fill="#ff69b4"/>
      <text x="0" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">ULGY DOG</text>
    </g>

    <!-- Text -->
    <text x="200" y="30" text-anchor="middle" font-family="Impact, Arial, sans-serif" font-size="16" fill="white" font-weight="bold">WHEN YOU COMPARE</text>
    <text x="200" y="270" text-anchor="middle" font-family="Impact, Arial, sans-serif" font-size="16" fill="white" font-weight="bold">THE DIFFERENCE IS CLEAR</text>
  </g>
</svg>