<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <radialGradient id="circleGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.3"/>
    </radialGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGradient)"/>

  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="150" fill="url(#circleGradient)" opacity="0.1"/>
  <circle cx="700" cy="500" r="200" fill="url(#circleGradient)" opacity="0.1"/>

  <!-- Title -->
  <text x="400" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" fill="#fbbf24" font-weight="bold">Tokenomics</text>

  <!-- Distribution chart -->
  <g transform="translate(400, 300)">
    <!-- Pie chart segments -->
    <path d="M 0 0 L 150 0 A 150 150 0 0 1 46.35 142.66 Z" fill="#f59e0b" stroke="#fbbf24" stroke-width="2"/>
    <path d="M 0 0 L 46.35 142.66 A 150 150 0 0 1 -122.87 86.04 Z" fill="#ef4444" stroke="#fbbf24" stroke-width="2"/>
    <path d="M 0 0 L -122.87 86.04 A 150 150 0 0 1 -122.87 -86.04 Z" fill="#3b82f6" stroke="#fbbf24" stroke-width="2"/>
    <path d="M 0 0 L -122.87 -86.04 A 150 150 0 0 1 46.35 -142.66 Z" fill="#10b981" stroke="#fbbf24" stroke-width="2"/>
    <path d="M 0 0 L 46.35 -142.66 A 150 150 0 0 1 150 0 Z" fill="#8b5cf6" stroke="#fbbf24" stroke-width="2"/>

    <!-- Labels -->
    <text x="90" y="-20" font-family="Arial, sans-serif" font-size="16" fill="white">50%</text>
    <text x="30" y="100" font-family="Arial, sans-serif" font-size="16" fill="white">30%</text>
    <text x="-110" y="60" font-family="Arial, sans-serif" font-size="16" fill="white">15%</text>
    <text x="-110" y="-100" font-family="Arial, sans-serif" font-size="16" fill="white">3%</text>
    <text x="60" y="-100" font-family="Arial, sans-serif" font-size="16" fill="white">2%</text>

    <!-- Legend -->
    <g transform="translate(-300, -150)">
      <rect x="0" y="0" width="20" height="20" fill="#f59e0b"/>
      <text x="30" y="15" font-family="Arial, sans-serif" font-size="14" fill="white">Liquidity Pool (50%)</text>

      <rect x="0" y="30" width="20" height="20" fill="#ef4444"/>
      <text x="30" y="45" font-family="Arial, sans-serif" font-size="14" fill="white">Community Rewards (30%)</text>

      <rect x="0" y="60" width="20" height="20" fill="#3b82f6"/>
      <text x="30" y="75" font-family="Arial, sans-serif" font-size="14" fill="white">Team & Development (15%)</text>

      <rect x="0" y="90" width="20" height="20" fill="#10b981"/>
      <text x="30" y="105" font-family="Arial, sans-serif" font-size="14" fill="white">Marketing (3%)</text>

      <rect x="0" y="120" width="20" height="20" fill="#8b5cf6"/>
      <text x="30" y="135" font-family="Arial, sans-serif" font-size="14" fill="white">Ecosystem (2%)</text>
    </g>
  </g>

  <!-- Decorative Ulgy Dog icons -->
  <g transform="translate(100, 150) scale(0.5)">
    <ellipse cx="50" cy="50" rx="30" ry="35" fill="#d2b48c"/>
    <circle cx="35" cy="40" r="6" fill="#ffffff"/>
    <circle cx="37" cy="42" r="2" fill="#000000"/>
    <circle cx="65" cy="45" r="7" fill="#ffffff"/>
    <circle cx="63" cy="47" r="2" fill="#000000"/>
    <ellipse cx="50" cy="65" rx="5" ry="4" fill="#000000"/>
    <path d="M 30 75 Q 50 85 70 75" stroke="#000000" stroke-width="2" fill="none"/>
  </g>

  <g transform="translate(650, 150) scale(0.5)">
    <ellipse cx="50" cy="50" rx="30" ry="35" fill="#d2b48c"/>
    <circle cx="35" cy="40" r="6" fill="#ffffff"/>
    <circle cx="37" cy="42" r="2" fill="#000000"/>
    <circle cx="65" cy="45" r="7" fill="#ffffff"/>
    <circle cx="63" cy="47" r="2" fill="#000000"/>
    <ellipse cx="50" cy="65" rx="5" ry="4" fill="#000000"/>
    <path d="M 30 75 Q 50 85 70 75" stroke="#000000" stroke-width="2" fill="none"/>
  </g>

  <g transform="translate(100, 450) scale(0.5)">
    <ellipse cx="50" cy="50" rx="30" ry="35" fill="#d2b48c"/>
    <circle cx="35" cy="40" r="6" fill="#ffffff"/>
    <circle cx="37" cy="42" r="2" fill="#000000"/>
    <circle cx="65" cy="45" r="7" fill="#ffffff"/>
    <circle cx="63" cy="47" r="2" fill="#000000"/>
    <ellipse cx="50" cy="65" rx="5" ry="4" fill="#000000"/>
    <path d="M 30 75 Q 50 85 70 75" stroke="#000000" stroke-width="2" fill="none"/>
  </g>

  <g transform="translate(650, 450) scale(0.5)">
    <ellipse cx="50" cy="50" rx="30" ry="35" fill="#d2b48c"/>
    <circle cx="35" cy="40" r="6" fill="#ffffff"/>
    <circle cx="37" cy="42" r="2" fill="#000000"/>
    <circle cx="65" cy="45" r="7" fill="#ffffff"/>
    <circle cx="63" cy="47" r="2" fill="#000000"/>
    <ellipse cx="50" cy="65" rx="5" ry="4" fill="#000000"/>
    <path d="M 30 75 Q 50 85 70 75" stroke="#000000" stroke-width="2" fill="none"/>
  </g>
</svg>