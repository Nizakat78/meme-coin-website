<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <radialGradient id="circleGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.3"/>
    </radialGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGradient)"/>

  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="120" fill="url(#circleGradient)" opacity="0.1"/>
  <circle cx="700" cy="400" r="150" fill="url(#circleGradient)" opacity="0.1"/>

  <!-- Title -->
  <text x="400" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" fill="#fbbf24" font-weight="bold">Join the Pack</text>

  <!-- Community members -->
  <g transform="translate(200, 200)">
    <!-- Central Ulgy Dog -->
    <g transform="scale(1.5)">
      <ellipse cx="50" cy="50" rx="20" ry="25" fill="#d2b48c"/>
      <circle cx="40" cy="40" r="4" fill="#ffffff"/>
      <circle cx="42" cy="42" r="1.5" fill="#000000"/>
      <circle cx="60" cy="42" r="4.5" fill="#ffffff"/>
      <circle cx="58" cy="44" r="1.5" fill="#000000"/>
      <ellipse cx="50" cy="60" rx="3" ry="2.5" fill="#000000"/>
      <path d="M 35 70 Q 50 75 65 70" stroke="#000000" stroke-width="1.5" fill="none"/>
    </g>

    <!-- Community members around the central dog -->
    <!-- Top -->
    <g transform="translate(50, -40)">
      <circle cx="0" cy="0" r="25" fill="#3b82f6" stroke="#fbbf24" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">@Hodler1</text>
    </g>

    <!-- Bottom -->
    <g transform="translate(50, 100)">
      <circle cx="0" cy="0" r="25" fill="#ef4444" stroke="#fbbf24" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">@Trader2</text>
    </g>

    <!-- Left -->
    <g transform="translate(-30, 30)">
      <circle cx="0" cy="0" r="25" fill="#10b981" stroke="#fbbf24" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">@NFT3</text>
    </g>

    <!-- Right -->
    <g transform="translate(130, 30)">
      <circle cx="0" cy="0" r="25" fill="#8b5cf6" stroke="#fbbf24" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">@Dev4</text>
    </g>

    <!-- Top-left -->
    <g transform="translate(10, -10)">
      <circle cx="0" cy="0" r="25" fill="#f59e0b" stroke="#fbbf24" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">@Artist5</text>
    </g>

    <!-- Top-right -->
    <g transform="translate(90, -10)">
      <circle cx="0" cy="0" r="25" fill="#ec4899" stroke="#fbbf24" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">@Influencer6</text>
    </g>

    <!-- Bottom-left -->
    <g transform="translate(10, 70)">
      <circle cx="0" cy="0" r="25" fill="#06b6d4" stroke="#fbbf24" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">@Mod7</text>
    </g>

    <!-- Bottom-right -->
    <g transform="translate(90, 70)">
      <circle cx="0" cy="0" r="25" fill="#84cc16" stroke="#fbbf24" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">@Support8</text>
    </g>
  </g>

  <!-- Social media icons -->
  <g transform="translate(550, 180)">
    <!-- Twitter -->
    <rect x="0" y="0" width="60" height="60" fill="#1d9bf0" rx="10" stroke="#fbbf24" stroke-width="2"/>
    <path d="M 30 15 C 35 15 40 20 40 25 L 40 35 C 40 40 35 45 30 45 L 20 45 C 15 45 10 40 10 35 L 10 25 C 10 20 15 15 20 15 L 30 15 Z" fill="white"/>
    <text x="30" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Twitter</text>

    <!-- Telegram -->
    <rect x="0" y="70" width="60" height="60" fill="#0088cc" rx="10" stroke="#fbbf24" stroke-width="2"/>
    <path d="M 15 25 L 45 25 L 45 45 L 15 45 Z" fill="white"/>
    <text x="30" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Telegram</text>

    <!-- Discord -->
    <rect x="0" y="140" width="60" height="60" fill="#5865f2" rx="10" stroke="#fbbf24" stroke-width="2"/>
    <path d="M 20 20 L 40 20 L 40 40 L 20 40 Z" fill="white"/>
    <text x="30" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Discord</text>
  </g>

  <!-- Decorative Ulgy Dog icons -->
  <g transform="translate(50, 350) scale(0.4)">
    <ellipse cx="50" cy="50" rx="30" ry="35" fill="#d2b48c"/>
    <circle cx="35" cy="40" r="6" fill="#ffffff"/>
    <circle cx="37" cy="42" r="2" fill="#000000"/>
    <circle cx="65" cy="45" r="7" fill="#ffffff"/>
    <circle cx="63" cy="47" r="2" fill="#000000"/>
    <ellipse cx="50" cy="65" rx="5" ry="4" fill="#000000"/>
    <path d="M 30 75 Q 50 85 70 75" stroke="#000000" stroke-width="2" fill="none"/>
  </g>

  <g transform="translate(700, 50) scale(0.4)">
    <ellipse cx="50" cy="50" rx="30" ry="35" fill="#d2b48c"/>
    <circle cx="35" cy="40" r="6" fill="#ffffff"/>
    <circle cx="37" cy="42" r="2" fill="#000000"/>
    <circle cx="65" cy="45" r="7" fill="#ffffff"/>
    <circle cx="63" cy="47" r="2" fill="#000000"/>
    <ellipse cx="50" cy="65" rx="5" ry="4" fill="#000000"/>
    <path d="M 30 75 Q 50 85 70 75" stroke="#000000" stroke-width="2" fill="none"/>
  </g>

  <g transform="translate(750, 380) scale(0.4)">
    <ellipse cx="50" cy="50" rx="30" ry="35" fill="#d2b48c"/>
    <circle cx="35" cy="40" r="6" fill="#ffffff"/>
    <circle cx="37" cy="42" r="2" fill="#000000"/>
    <circle cx="65" cy="45" r="7" fill="#ffffff"/>
    <circle cx="63" cy="47" r="2" fill="#000000"/>
    <ellipse cx="50" cy="65" rx="5" ry="4" fill="#000000"/>
    <path d="M 30 75 Q 50 85 70 75" stroke="#000000" stroke-width="2" fill="none"/>
  </g>
</svg>