<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1a1a1a" stroke="#fbbf24" stroke-width="3"/>

  <!-- Dog head -->
  <ellipse cx="100" cy="90" rx="60" ry="70" fill="#d2b48c" stroke="#a0522d" stroke-width="2"/>

  <!-- Left ear -->
  <path d="M 50 40 Q 30 10 60 30 Z" fill="#a0522d" stroke="#8b4513" stroke-width="1"/>

  <!-- Right ear -->
  <path d="M 150 40 Q 170 10 140 30 Z" fill="#a0522d" stroke="#8b4513" stroke-width="1"/>

  <!-- Left eye (wonky) -->
  <circle cx="75" cy="80" r="12" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <circle cx="78" cy="83" r="5" fill="#000000"/>

  <!-- Right eye (different size) -->
  <circle cx="125" cy="85" r="15" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <circle cx="122" cy="88" r="5" fill="#000000"/>

  <!-- Wonky nose -->
  <ellipse cx="100" cy="110" rx="10" ry="8" fill="#000000"/>

  <!-- Wonky mouth -->
  <path d="M 70 130 Q 100 150 130 130" stroke="#000000" stroke-width="3" fill="none"/>

  <!-- Tongue sticking out -->
  <path d="M 100 130 Q 110 145 105 155 Q 95 150 100 135 Z" fill="#ff69b4"/>

  <!-- Ugly spots -->
  <circle cx="60" cy="95" r="4" fill="#8b4513"/>
  <circle cx="140" cy="100" r="3" fill="#8b4513"/>
  <circle cx="90" cy="60" r="2" fill="#8b4513"/>

  <!-- Decorative elements -->
  <circle cx="30" cy="30" r="8" fill="#fbbf24" opacity="0.7"/>
  <circle cx="170" cy="30" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="30" cy="170" r="5" fill="#ef4444" opacity="0.7"/>
  <circle cx="170" cy="170" r="7" fill="#f59e0b" opacity="0.7"/>

  <!-- ULGD text -->
  <text x="100" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fbbf24">ULGD</text>
</svg>