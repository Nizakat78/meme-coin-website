<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="1000" height="400">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <radialGradient id="circleGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.3"/>
    </radialGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGradient)"/>

  <!-- Decorative elements -->
  <circle cx="50" cy="50" r="80" fill="url(#circleGradient)" opacity="0.1"/>
  <circle cx="950" cy="350" r="100" fill="url(#circleGradient)" opacity="0.1"/>

  <!-- Title -->
  <text x="500" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" fill="#fbbf24" font-weight="bold">Roadmap</text>

  <!-- Timeline -->
  <line x1="100" y1="200" x2="900" y2="200" stroke="#fbbf24" stroke-width="4"/>

  <!-- Milestones -->
  <g>
    <!-- Q1 -->
    <circle cx="200" cy="200" r="20" fill="#f59e0b" stroke="#fbbf24" stroke-width="3"/>
    <rect x="150" y="120" width="100" height="60" fill="#1f2937" stroke="#fbbf24" stroke-width="2" rx="8"/>
    <text x="200" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fbbf24" font-weight="bold">Q1 2025</text>
    <text x="200" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">Launch</text>
    <text x="200" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9ca3af">Community Building</text>

    <!-- Q2 -->
    <circle cx="400" cy="200" r="20" fill="#f59e0b" stroke="#fbbf24" stroke-width="3"/>
    <rect x="350" y="120" width="100" height="60" fill="#1f2937" stroke="#fbbf24" stroke-width="2" rx="8"/>
    <text x="400" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fbbf24" font-weight="bold">Q2 2025</text>
    <text x="400" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">Growth</text>
    <text x="400" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9ca3af">Exchange Listings</text>

    <!-- Q3 -->
    <circle cx="600" cy="200" r="20" fill="#f59e0b" stroke="#fbbf24" stroke-width="3"/>
    <rect x="550" y="120" width="100" height="60" fill="#1f2937" stroke="#fbbf24" stroke-width="2" rx="8"/>
    <text x="600" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fbbf24" font-weight="bold">Q3 2025</text>
    <text x="600" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">Expansion</text>
    <text x="600" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9ca3af">NFT Collection</text>

    <!-- Q4 -->
    <circle cx="800" cy="200" r="20" fill="#f59e0b" stroke="#fbbf24" stroke-width="3"/>
    <rect x="750" y="120" width="100" height="60" fill="#1f2937" stroke="#fbbf24" stroke-width="2" rx="8"/>
    <text x="800" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fbbf24" font-weight="bold">Q4 2025</text>
    <text x="800" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">To the Moon</text>
    <text x="800" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9ca3af">Major Partnerships</text>
  </g>

  <!-- Ulgy Dog icons along the timeline -->
  <g transform="translate(180, 250) scale(0.3)">
    <ellipse cx="50" cy="50" rx="30" ry="35" fill="#d2b48c"/>
    <circle cx="35" cy="40" r="6" fill="#ffffff"/>
    <circle cx="37" cy="42" r="2" fill="#000000"/>
    <circle cx="65" cy="45" r="7" fill="#ffffff"/>
    <circle cx="63" cy="47" r="2" fill="#000000"/>
    <ellipse cx="50" cy="65" rx="5" ry="4" fill="#000000"/>
    <path d="M 30 75 Q 50 85 70 75" stroke="#000000" stroke-width="2" fill="none"/>
  </g>

  <g transform="translate(380, 250) scale(0.3)">
    <ellipse cx="50" cy="50" rx="30" ry="35" fill="#d2b48c"/>
    <circle cx="35" cy="40" r="6" fill="#ffffff"/>
    <circle cx="37" cy="42" r="2" fill="#000000"/>
    <circle cx="65" cy="45" r="7" fill="#ffffff"/>
    <circle cx="63" cy="47" r="2" fill="#000000"/>
    <ellipse cx="50" cy="65" rx="5" ry="4" fill="#000000"/>
    <path d="M 30 75 Q 50 85 70 75" stroke="#000000" stroke-width="2" fill="none"/>
  </g>

  <g transform="translate(580, 250) scale(0.3)">
    <ellipse cx="50" cy="50" rx="30" ry="35" fill="#d2b48c"/>
    <circle cx="35" cy="40" r="6" fill="#ffffff"/>
    <circle cx="37" cy="42" r="2" fill="#000000"/>
    <circle cx="65" cy="45" r="7" fill="#ffffff"/>
    <circle cx="63" cy="47" r="2" fill="#000000"/>
    <ellipse cx="50" cy="65" rx="5" ry="4" fill="#000000"/>
    <path d="M 30 75 Q 50 85 70 75" stroke="#000000" stroke-width="2" fill="none"/>
  </g>

  <g transform="translate(780, 250) scale(0.3)">
    <ellipse cx="50" cy="50" rx="30" ry="35" fill="#d2b48c"/>
    <circle cx="35" cy="40" r="6" fill="#ffffff"/>
    <circle cx="37" cy="42" r="2" fill="#000000"/>
    <circle cx="65" cy="45" r="7" fill="#ffffff"/>
    <circle cx="63" cy="47" r="2" fill="#000000"/>
    <ellipse cx="50" cy="65" rx="5" ry="4" fill="#000000"/>
    <path d="M 30 75 Q 50 85 70 75" stroke="#000000" stroke-width="2" fill="none"/>
  </g>

  <!-- Decorative elements -->
  <circle cx="250" cy="100" r="15" fill="#f59e0b" opacity="0.5">
    <animate attributeName="r" values="15;20;15" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="320" r="12" fill="#f59e0b" opacity="0.5">
    <animate attributeName="r" values="12;18;12" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>