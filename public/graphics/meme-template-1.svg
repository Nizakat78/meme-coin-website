<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGradient)" rx="10"/>

  <!-- Ulgy Dog meme style -->
  <g transform="translate(200, 150)">
    <!-- Dog head -->
    <ellipse cx="0" cy="-20" rx="60" ry="70" fill="#d2b48c" stroke="#a0522d" stroke-width="3"/>

    <!-- Wonky eyes -->
    <circle cx="-25" cy="-35" r="12" fill="#ffffff" stroke="#000000" stroke-width="2"/>
    <circle cx="-22" cy="-32" r="5" fill="#000000"/>
    <circle cx="25" cy="-30" r="15" fill="#ffffff" stroke="#000000" stroke-width="2"/>
    <circle cx="22" cy="-27" r="5" fill="#000000"/>

    <!-- Nose -->
    <ellipse cx="0" cy="10" rx="10" ry="8" fill="#000000"/>

    <!-- Mouth -->
    <path d="M -30 30 Q 0 50 30 30" stroke="#000000" stroke-width="3" fill="none"/>

    <!-- Tongue -->
    <path d="M 0 30 Q 10 45 5 55 Q -5 50 0 35 Z" fill="#ff69b4"/>

    <!-- Top text -->
    <rect x="-180" y="-120" width="360" height="30" fill="black" opacity="0.8"/>
    <text x="0" y="-100" text-anchor="middle" font-family="Impact, Arial, sans-serif" font-size="20" fill="white" font-weight="bold">WHEN YOU REALIZE</text>

    <!-- Bottom text -->
    <rect x="-180" y="80" width="360" height="30" fill="black" opacity="0.8"/>
    <text x="0" y="100" text-anchor="middle" font-family="Impact, Arial, sans-serif" font-size="20" fill="white" font-weight="bold">ULGD IS THE FUTURE</text>
  </g>
</svg>